services:
  db:
    image: mysql:8.0
    container_name: ugo_db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ugo_network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ugo_php
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - ./backend/data/customers.csv:/var/www/html/data/customers.csv
      - ./backend/data/purchases.csv:/var/www/html/data/purchases.csv
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ugo_network
    command: >
      sh -c "[ ! -f vendor/autoload.php ] &&
             composer install --no-interaction --optimize-autoloader;
             [ -z \"$(ls -A migrations/*.php 2>/dev/null)\" ] &&
             php bin/console doctrine:migrations:diff --no-interaction;
             php bin/console doctrine:migrations:migrate --no-interaction;
             exec php-fpm"

  nginx:
    image: nginx:alpine
    container_name: ugo_nginx
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - ugo_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ugo_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - ugo_network
    command: >
      sh -c "[ ! -d node_modules/.bin ] && npm install;
             npm run dev -- --host 0.0.0.0"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ugo_phpmyadmin
    restart: unless-stopped
    ports:
      - '8081:80'
    env_file:
      - ./backend/.env
    environment:
      PMA_HOST: db
    depends_on:
      - db
    networks:
      - ugo_network

networks:
  ugo_network:
    driver: bridge

volumes:
  db_data:
  backend_vendor:
  frontend_node_modules:
